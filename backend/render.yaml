services:
  - type: web
    name: radar-patriota-backend
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_SECRET_KEY
        value: radar-admin-2026
      - key: GEMINI_API_KEY
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: FRONTEND_URL
        value: https://radar-patriota.vercel.app
      - key: BACKEND_URL
        value: https://radar-patriota-backend.onrender.com
    disk:
      name: radar-data
      mountPath: /var/data
      sizeGB: 1
